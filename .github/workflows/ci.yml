name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      AUTH_SECRET: ci_auth_secret_minimum_16_chars
      NODE_ENV: test
      CI: true
      # Playwright starts Vite on 127.0.0.1:5173; allow browser API calls from that origin.
      CORS_ORIGIN: http://127.0.0.1:5173,http://localhost:5173
      WEB_BASE_URL: http://127.0.0.1:5173

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Apply database migrations
        run: pnpm --filter @cuepoint/db migrate:deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

      - name: Install Playwright Chromium
        run: pnpm --filter @cuepoint/web exec playwright install chromium --with-deps

      - name: End-to-end tests
        run: pnpm test:e2e
